name: job-outputs

on: 
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    outputs:
      job1_output: ${{ steps.step2.outputs.msg }}

    steps:
      - name: set a variable
        id: step1
        run: echo "msg=Hello from job1" >> $GITHUB_OUTPUT

      - name: get step1 variable
        run: echo "the output from step1 is ${{ steps.step1.outputs.msg }}"

      - name: set another varaible
        id: step2
        run: echo "msg=DATA2" >> $GITHUB_OUTPUT

  job2:
    needs: job1    
    runs-on: ubuntu-latest
    
    steps:
      - name: get data from job1
        run: echo " the output from job1 is ${{ needs.job1. outputs.job1_output}}"